<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Closer Click Messenger</title>
  <style>
    html, body { margin: 0; padding: 0; height: 100%; background: #1b2533; }
    iframe { width: 100%; height: 100%; border: 0; display: block; }
  </style>
</head>
<body>
  <!--
    Wrapper de la extensión: este HTML vive en chrome-extension://<id>/overlay.html.
    Está listado en `web_accessible_resources` para poder embeberse desde
    cualquier pestaña vía content.js.

    El iframe interior carga messenger.closer.click. Como esta página es
    de la extensión y la extensión declara host_permissions sobre
    messenger.closer.click, el iframe obtiene acceso a localStorage
    UNPARTITIONED — la misma sesión que ven las pestañas normales del
    navegador. Sin esta capa intermedia, el iframe quedaría partitioned
    bajo el origen de la página visitada (youtube.com, gmail.com, etc.).
  -->
  <iframe id="pwa"
          src="https://messenger.closer.click/?embed=overlay"
          allow="clipboard-read; clipboard-write"
          sandbox="allow-scripts allow-same-origin allow-forms allow-popups"></iframe>
</body>
</html>
